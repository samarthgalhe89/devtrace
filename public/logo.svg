<svg viewBox="50 40 100 110" xmlns="http://www.w3.org/2000/svg">

<defs>
<style>
@keyframes rise { from { transform: scaleY(0) } to { transform: scaleY(1) } }
@keyframes fade { from { opacity: 0 } to { opacity: 1 } }

.b1 { transform-origin: 72px 138px; animation: rise 0.9s cubic-bezier(.22,1,.36,1) both 0.2s }
.b2 { transform-origin: 92px 138px; animation: rise 0.9s cubic-bezier(.22,1,.36,1) both 0.35s }
.b3 { transform-origin: 112px 138px; animation: rise 0.9s cubic-bezier(.22,1,.36,1) both 0.5s }

.nodes { animation: fade 1s ease both 0.8s }
</style>
</defs>

<!-- Bars -->
<rect class="b1" x="64" y="108" width="14" height="30" rx="3" fill="#79c0ff"/>
<rect class="b2" x="84" y="92" width="14" height="46" rx="3" fill="#79c0ff" opacity="0.6"/>
<rect class="b3" x="104" y="76" width="14" height="62" rx="3" fill="#79c0ff" opacity="0.35"/>

<!-- Graph nodes -->
<g class="nodes" fill="none">
<line x1="68" y1="62" x2="100" y2="52" stroke="#79c0ff" stroke-width="1.2" opacity="0.5"/>
<line x1="100" y1="52" x2="132" y2="62" stroke="#79c0ff" stroke-width="1.2" opacity="0.5"/>

<circle cx="68" cy="62" r="4" fill="#79c0ff"/>
<circle cx="100" cy="52" r="4" fill="#79c0ff"/>
<circle cx="132" cy="62" r="4" fill="#79c0ff"/>
</g>

</svg>